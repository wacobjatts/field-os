<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FieldBuilder</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div>FIELDBUILDER</div>
    <div id="status">Ready</div>
  </header>

  <main class="container">

    <div class="card">
      <div class="card-title">STRUCTURE (HTML)</div>
      <textarea id="htmlInput"></textarea>
    </div>

    <div class="card">
      <div class="card-title">STYLE (CSS)</div>
      <textarea id="cssInput"></textarea>
    </div>

    <div class="card">
      <div class="card-title">BEHAVIOR (JS)</div>
      <textarea id="jsInput"></textarea>
    </div>

    <div class="card preview-card">
      <div class="card-title">PREVIEW</div>
      <iframe id="preview"></iframe>
    </div>

  </main>

  <script src="script.js"></script>

</body>
</html>
