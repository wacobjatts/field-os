<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIELD_OS // USABILITY_LIFT</title>
    <style>
        :root {
            --substrate: #050505;
            --cyan: #00f2ff;
            --cyan-dim: rgba(0, 242, 255, 0.15);
            --warning: #ffaa00;
            --critical: #ff3300;
            --font: 'Courier New', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--substrate);
            color: var(--cyan);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- HUD --- */
        #field-os-hud {
            padding: 15px;
            border-bottom: 1px solid var(--cyan-dim);
            background: rgba(0, 242, 255, 0.02);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            flex-shrink: 0;
        }

        .metric { display: flex; flex-direction: column; }
        .label { color: var(--cyan-dim); font-size: 0.6rem; letter-spacing: 1px; }
        .value { font-size: 0.85rem; font-weight: bold; }

        /* --- STRUCTURAL BAY (INPUT) --- */
        #structural-bay {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--cyan-dim);
        }

        .section-label {
            font-size: 0.5rem;
            padding: 5px 15px;
            color: var(--cyan-dim);
            background: rgba(0, 242, 255, 0.05);
        }

        #code-input {
            flex: 1;
            background: transparent;
            color: var(--cyan);
            border: none;
            padding: 15px;
            font-family: var(--font);
            font-size: 14px;
            resize: none;
            outline: none;
            text-transform: none;
            caret-color: var(--cyan);
        }

        /* --- LIVE SURFACE (PREVIEW) --- */
        #live-surface {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
            padding: 10px; /* Padding creates the frame effect */
        }

        #preview-frame {
            flex: 1;
            width: 100%;
            border: 1px solid var(--cyan-dim); /* Separation Border */
            background: white;
            border-radius: 2px;
        }

        /* --- CONTROLS --- */
        #controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            background: var(--substrate);
            border-top: 1px solid var(--cyan-dim);
        }

        #pulse-trigger {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 10px 30px;
            font-family: var(--font);
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        #pulse-trigger:active {
            background: var(--cyan);
            color: var(--substrate);
        }

        /* --- STATES --- */
        .nominal { color: var(--cyan); text-shadow: 0 0 5px var(--cyan); }
        .strain { color: var(--warning); text-shadow: 0 0 5px var(--warning); }
        .collapse { color: var(--critical); animation: alert 0.4s infinite; }

        @keyframes alert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .kinetic-flash { border-color: var(--cyan) !important; }
    </style>
</head>
<body>

    <div id="field-os-hud">
        <div class="metric">
            <span class="label">STATE</span>
            <span id="state-val" class="value nominal">IDLE</span>
        </div>
        <div class="metric">
            <span class="label">ENERGY_DENSITY</span>
            <span id="energy-val" class="value">0.000</span>
        </div>
        <div class="metric">
            <span class="label">STABILITY</span>
            <span id="stability-val" class="value">1.000</span>
        </div>
        <div class="metric">
            <span class="label">PULSE_COUNT</span>
            <span id="pulse-val" class="value">0</span>
        </div>
    </div>

    <div id="structural-bay">
        <div class="section-label">STRUCTURAL_BAY</div>
        <textarea id="code-input" spellcheck="false" placeholder="// INJECT STRUCTURE HERE"><h1>VISIBLE_REALITY</h1>
<p>The system now ensures readability by default.</p></textarea>
    </div>

    <div id="live-surface">
        <div class="section-label" style="background: transparent; color: var(--cyan-dim); padding-left: 5px;">LIVE_SURFACE</div>
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="controls">
        <button id="pulse-trigger" onclick="FieldOS.pulse(0.1)">Manual Pulse</button>
    </div>

    <script>
        const FieldOS = {
            kernel: {
                energy: 0.0,
                stability: 1.0,
                pulses: 0,
                resilience: 0.85
            },

            // Safe Injection Wrapper
            generateVesselHTML: function(userContent) {
                return `
                    <html>
                    <head>
                        <style>
                            body {
                                background: #ffffff;
                                color: #000000;
                                font-family: sans-serif;
                                padding: 20px;
                                margin: 0;
                                line-height: 1.5;
                            }
                        </style>
                    </head>
                    <body>
                        ${userContent}
                    </body>
                    </html>
                `;
            },

            sync: function() {
                const input = document.getElementById('code-input').value;
                const preview = document.getElementById('preview-frame');
                
                // 1. Render to Surface with Safety Wrapper
                const doc = preview.contentDocument || preview.contentWindow.document;
                doc.open();
                doc.write(this.generateVesselHTML(input));
                doc.close();

                // 2. Feed Kernel
                this.kernel.pulses++;
                this.calculatePhysics(input);
                this.renderHUD();
            },

            calculatePhysics: function(content) {
                const len = content.trim().length;

                if (len === 0) {
                    this.kernel.energy = 0;
                    this.kernel.stability = 0; // Collapse
                } else {
                    this.kernel.energy = len / 400; 
                    const pressure = this.kernel.energy * (1 - this.kernel.resilience);
                    this.kernel.stability = Math.max(0, 1 - (pressure * 2.5));
                }
            },

            pulse: function(magnitude) {
                this.kernel.pulses++;
                this.kernel.energy += magnitude;
                const hud = document.getElementById('field-os-hud');
                hud.classList.add('kinetic-flash');
                setTimeout(() => hud.classList.remove('kinetic-flash'), 100);
                this.renderHUD();
            },

            renderHUD: function() {
                const stateEl = document.getElementById('state-val');
                const energyEl = document.getElementById('energy-val');
                const stabilityEl = document.getElementById('stability-val');
                const pulseEl = document.getElementById('pulse-val');

                energyEl.innerText = this.kernel.energy.toFixed(3);
                stabilityEl.innerText = this.kernel.stability.toFixed(3);
                pulseEl.innerText = this.kernel.pulses;

                if (this.kernel.stability <= 0) {
                    stateEl.innerText = "COLLAPSE";
                    stateEl.className = "value collapse";
                } else if (this.kernel.stability < 0.7) {
                    stateEl.innerText = "STRAIN";
                    stateEl.className = "value strain";
                } else {
                    stateEl.innerText = "NOMINAL";
                    stateEl.className = "value nominal";
                }
            },

            boot: function() {
                const editor = document.getElementById('code-input');
                editor.addEventListener('input', () => this.sync());
                
                setTimeout(() => {
                    this.sync();
                    console.log("FIELD_OS :: USABILITY_LAYER_NOMINAL");
                }, 500);
            }
        };

        window.onload = () => FieldOS.boot();
    </script>
</body>
</html>
