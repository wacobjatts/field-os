<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>field-os</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #05070a;
      color: #cfe6ff;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    /* subtle grid */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* LEFT PANEL */
    .left {
      width: 90px;
      border-right: 1px solid rgba(30,123,255,0.2);
      padding: 10px;
      z-index: 1;
    }

    .ticker {
      border: 1px solid rgba(30,123,255,0.3);
      padding: 10px;
      margin-bottom: 10px;
      color: #1e7bff;
      text-align: center;
    }

    /* CENTER */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    .header {
      padding: 10px;
      border-bottom: 1px solid rgba(30,123,255,0.2);
      display: flex;
      justify-content: space-between;
    }

    .chart {
      flex: 1;
      position: relative;
      margin: 10px;
      border: 1px solid rgba(30,123,255,0.2);
      overflow: hidden;
    }

    /* horizontal lines */
    .line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    .l1 { top: 20%; }
    .l2 { top: 50%; }
    .l3 { top: 80%; }

    /* side numbers */
    .num {
      position: absolute;
      left: 5px;
      color: #ffd84d;
      font-size: 12px;
    }

    .n1 { top: 17%; }
    .n2 { top: 47%; }
    .n3 { top: 77%; }

    /* svg line */
    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* value */
    .value {
      position: absolute;
      right: 10px;
      top: 10px;
      color: #ffd84d;
      font-size: 26px;
      font-weight: bold;
    }

    /* bottom dock */
    .bottom {
      height: 100px;
      border-top: 1px solid rgba(30,123,255,0.2);
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .card {
      border: 1px solid rgba(30,123,255,0.3);
      padding: 10px;
      color: #1e7bff;
      min-width: 120px;
    }

    /* MOBILE FIX */
    @media (max-width: 768px) {
      .left {
        width: 70px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="grid"></div>

    <!-- LEFT -->
    <div class="left">
      <div class="ticker">TSLA</div>
      <div class="ticker">NVDA</div>
      <div class="ticker">SPY</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="header">
        <div style="color:#1e7bff;">branch::kinetic</div>
        <div style="color:#ffd84d;">5m</div>
      </div>

      <div class="chart">
        <div class="line l1"></div>
        <div class="line l2"></div>
        <div class="line l3"></div>

        <div class="num n1">80</div>
        <div class="num n2">50</div>
        <div class="num n3">20</div>

        <svg viewBox="0 0 1000 400">
          <path
            d="M0 200 C150 260 250 180 350 220
               C450 260 550 140 650 180
               C750 220 850 180 1000 200"
            stroke="#1e7bff"
            stroke-width="2"
            fill="none"
          />
        </svg>

        <div class="value">62</div>
      </div>

      <div class="bottom">
        <div class="card">volume</div>
        <div class="card">absorption</div>
        <div class="card">transmission</div>
      </div>
    </div>
  </div>
</body>
</html>
