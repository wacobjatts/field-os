<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>field-os</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #030507;
      color: #cfe6ff;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 220px 1fr 260px;
      grid-template-rows: 1fr 160px;
      height: 100vh;
      width: 100vw;
    }

    /* GRID BACKGROUND */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* LEFT PANEL */
    .left {
      grid-row: 1 / span 2;
      border-right: 1px solid rgba(30,123,255,0.2);
      padding: 12px;
      z-index: 1;
    }

    .left h3 {
      color: #1e7bff;
      margin-bottom: 10px;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .ticker {
      border: 1px solid rgba(30,123,255,0.3);
      padding: 12px;
      margin-bottom: 10px;
      text-align: center;
      color: #1e7bff;
    }

    /* CENTER CHART */
    .center {
      position: relative;
      border-bottom: 1px solid rgba(30,123,255,0.2);
      z-index: 1;
    }

    .header {
      padding: 10px;
      border-bottom: 1px solid rgba(30,123,255,0.2);
      display: flex;
      justify-content: space-between;
    }

    .chart {
      position: relative;
      height: calc(100% - 40px);
    }

    /* BASELINE */
    .baseline {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.25);
    }

    /* OTHER LINES */
    .line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .top { top: 20%; }
    .bottom { top: 80%; }

    /* NUMBERS */
    .num {
      position: absolute;
      left: 10px;
      color: #ffd84d;
      font-size: 12px;
    }

    .n1 { top: 18%; }
    .n2 { top: 48%; }
    .n3 { top: 78%; }

    /* LINE */
    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* VALUE */
    .value {
      position: absolute;
      right: 15px;
      top: 15px;
      color: #ffd84d;
      font-size: 28px;
      font-weight: bold;
    }

    /* RIGHT PANEL */
    .right {
      border-left: 1px solid rgba(30,123,255,0.2);
      padding: 12px;
      z-index: 1;
    }

    .right h3 {
      color: #ffd84d;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .order {
      border: 1px solid rgba(30,123,255,0.3);
      padding: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .ask { color: #ff6b6b; }
    .bid { color: #5cff9d; }

    /* BOTTOM */
    .bottom {
      grid-column: 2 / span 2;
      display: flex;
      gap: 10px;
      padding: 10px;
      border-top: 1px solid rgba(30,123,255,0.2);
      overflow-x: auto;
      z-index: 1;
    }

    .card {
      min-width: 160px;
      border: 1px solid rgba(30,123,255,0.3);
      padding: 12px;
      color: #1e7bff;
      text-align: center;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .app {
        grid-template-columns: 70px 1fr;
        grid-template-rows: 1fr 140px;
      }

      .right {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="grid"></div>

  <div class="app">

    <!-- LEFT -->
    <div class="left">
      <h3>SYSTEM</h3>
      <div class="ticker">TSLA</div>
      <div class="ticker">NVDA</div>
      <div class="ticker">SPY</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <div class="header">
        <div style="color:#1e7bff;">KINETIC</div>
        <div style="color:#ffd84d;">5M</div>
      </div>

      <div class="chart">
        <div class="line top"></div>
        <div class="baseline"></div>
        <div class="line bottom"></div>

        <div class="num n1">80</div>
        <div class="num n2">50</div>
        <div class="num n3">20</div>

        <svg viewBox="0 0 1000 400">
          <path
            d="M0 200 C200 260 350 180 500 220
               C650 260 800 180 1000 210"
            stroke="#1e7bff"
            stroke-width="2"
            fill="none"
          />
        </svg>

        <div class="value">63</div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <h3>ORDER FLOW</h3>
      <div class="order ask">
        <span>ASK</span>
        <span>248.22</span>
      </div>
      <div class="order bid">
        <span>BID</span>
        <span>248.10</span>
      </div>
    </div>

    <!-- BOTTOM -->
    <div class="bottom">
      <div class="card">VOLUME</div>
      <div class="card">TRANSMISSION</div>
      <div class="card">DECAY</div>
      <div class="card">TENSION</div>
      <div class="card">OSCILLATOR</div>
      <div class="card">COMPRESSION</div>
    </div>

  </div>
</body>
</html>
