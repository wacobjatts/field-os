<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIELD_BUILDER // CORE</title>
    <style>
        :root {
            --bg-deep: #000000;
            --bg-panel: #0a0a0a;
            --bg-card: #111111;
            /* FIELDRATE BRAND CYAN */
            --fr-cyan: #00f2ff;
            --fr-cyan-dim: rgba(0, 242, 255, 0.1);
            --fr-cyan-glow: rgba(0, 242, 255, 0.4);
            --text-dim: #666;
            --text-main: #eee;
            --border-soft: #222;
            --font: 'Inter', -apple-system, sans-serif;
            --font-mono: 'Courier New', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- PERSISTENT HUD (FieldRate Style) --- */
        header {
            padding: 16px 20px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .system-meta { display: flex; gap: 20px; }
        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
        .stat-value { font-size: 0.85rem; font-weight: 600; color: var(--fr-cyan); }

        /* --- THE CHAMBER (VIEW ROUTER) --- */
        main {
            flex: 1;
            position: relative;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chamber { display: none; flex-direction: column; gap: 16px; width: 100%; height: 100%; }
        .chamber.active { display: flex; }

        /* --- CARD-BASED UI (Estimate.tsx Pattern) --- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: border-color 0.3s ease;
        }

        .card:focus-within { border-color: var(--fr-cyan-dim); }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
        }

        .card-title { font-size: 0.75rem; font-weight: bold; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        /* --- BUILDER INPUTS --- */
        textarea {
            background: transparent;
            border: none;
            color: var(--fr-cyan);
            font-family: var(--font-mono);
            font-size: 14px;
            min-height: 150px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        /* --- PREVIEW SURFACE --- */
        #preview-surface {
            background: white;
            border-radius: 6px;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- GROUNDED NAVIGATION --- */
        nav {
            background: var(--bg-panel);
            border-top: 1px solid var(--border-soft);
            padding: 10px 10px 25px 10px; /* Mobile safe area */
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 8px;
            transition: all 0.2s ease;
        }

        .nav-item.active { color: var(--fr-cyan); }
        .nav-icon { width: 20px; height: 20px; border: 2px solid currentColor; border-radius: 4px; }
        .nav-label { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; }

        /* --- INDICATORS --- */
        .integrity-bar {
            height: 2px;
            background: #222;
            width: 100%;
            border-radius: 1px;
            overflow: hidden;
        }
        #integrity-fill { height: 100%; background: var(--fr-cyan); width: 100%; transition: width 0.5s ease; }

    </style>
</head>
<body>

    <header>
        <div class="stat">
            <span class="stat-label">System</span>
            <span class="stat-value">FIELDBUILDER_v1</span>
        </div>
        <div class="system-meta">
            <div class="stat">
                <span class="stat-label">Energy</span>
                <span id="energy-val" class="stat-value">0.00</span>
            </div>
            <div class="stat">
                <span class="stat-label">Stability</span>
                <span id="stability-val" class="stat-value">1.00</span>
            </div>
        </div>
    </header>

    <main id="chamber-container">
        <div id="chamber-build" class="chamber active">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Structural Bay // Input</span>
                    <span id="save-status" style="font-size: 0.6rem; color: var(--text-dim);">AUTO-SAVED</span>
                </div>
                <textarea id="code-input" spellcheck="false" placeholder="// START BUILDING..."><h1>Vessel Active</h1>
<p>FieldRate structural logic detected.</p></textarea>
                <div class="integrity-bar"><div id="integrity-fill"></div></div>
            </div>
        </div>

        <div id="chamber-preview" class="chamber">
            <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
                <span class="card-title">Manifested Reality</span>
                <iframe id="preview-surface"></iframe>
            </div>
        </div>

        <div id="chamber-history" class="chamber">
            <div class="card">
                <div class="card-title">Pulse History</div>
                <div id="history-list" style="font-size: 0.7rem; color: var(--text-dim);">No pulses recorded.</div>
            </div>
        </div>
    </main>

    <nav>
        <button class="nav-item" onclick="App.switch('home')">
            <div class="nav-icon"></div>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item active" onclick="App.switch('build')">
            <div class="nav-icon" style="background: var(--fr-cyan);"></div>
            <span class="nav-label">Build</span>
        </button>
        <button class="nav-item" onclick="App.switch('preview')">
            <div class="nav-icon"></div>
            <span class="nav-label">Preview</span>
        </button>
        <button class="nav-item" onclick="App.switch('history')">
            <div class="nav-icon"></div>
            <span class="nav-label">History</span>
        </button>
    </nav>

    <script>
        const App = {
            state: {
                energy: 0,
                stability: 1.0,
                content: "",
                pulses: []
            },

            // Chamber Management (Navigation)
            switch: function(mode) {
                document.querySelectorAll('.chamber').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                
                const target = document.getElementById(`chamber-${mode}`);
                if(target) target.classList.add('active');
                
                // Update nav state visuals (simplified for phase 1)
                event.currentTarget.classList.add('active');

                if(mode === 'preview') this.renderPreview();
            },

            // Logic: The "Estimate" pattern of calculation
            processPulse: function() {
                const input = document.getElementById('code-input').value;
                this.state.content = input;
                
                // Energy = Content Mass
                this.state.energy = (input.length / 500).toFixed(2);
                
                // Stability = Logical Integrity (Simulation)
                this.state.stability = input.length > 0 ? Math.max(0.2, 1 - (this.state.energy * 0.1)).toFixed(2) : 0;

                this.updateHUD();
                this.autoSave();
            },

            updateHUD: function() {
                document.getElementById('energy-val').innerText = this.state.energy;
                document.getElementById('stability-val').innerText = this.state.stability;
                document.getElementById('integrity-fill').style.width = (this.state.stability * 100) + "%";
            },

            autoSave: function() {
                const status = document.getElementById('save-status');
                status.innerText = "SAVING...";
                status.style.color = "var(--fr-cyan)";
                
                localStorage.setItem('field_build_state', this.state.content);
                
                setTimeout(() => {
                    status.innerText = "AUTO-SAVED";
                    status.style.color = "var(--text-dim)";
                }, 800);
            },

            renderPreview: function() {
                const frame = document.getElementById('preview-surface');
                const doc = frame.contentDocument || frame.contentWindow.document;
                const wrapper = `
                    <html><head><style>
                        body { font-family: sans-serif; padding: 30px; line-height: 1.6; color: #111; }
                        h1 { color: #000; border-bottom: 1px solid #eee; padding-bottom: 10px; }
                    </style></head><body>${this.state.content}</body></html>
                `;
                doc.open();
                doc.write(wrapper);
                doc.close();
            },

            boot: function() {
                const editor = document.getElementById('code-input');
                editor.addEventListener('input', () => this.processPulse());
                
                // Initial Load
                const saved = localStorage.getItem('field_build_state');
                if(saved) editor.value = saved;
                
                this.processPulse();
                console.log("FIELDBUILDER :: ONLINE");
            }
        };

        window.onload = () => App.boot();
    </script>
</body>
</html>
