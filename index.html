<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIELD_OS // HIGH_FIDELITY</title>
    <style>
        :root {
            --substrate: #000000;
            --panel-bg: #050505;
            /* FIELDRATE CYAN ANCHOR */
            --accent-hue: 185; 
            --accent: hsl(var(--accent-hue), 100%, 50%);
            --accent-glow: hsla(var(--accent-hue), 100%, 50%, 0.4);
            --accent-dim: hsla(var(--accent-hue), 100%, 50%, 0.1);
            --neutral-dim: #444;
            --warning: #ffaa00;
            --critical: #ff3300;
            --font: 'Courier New', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--substrate);
            color: var(--accent);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- HIGH-FIDELITY HUD --- */
        #field-os-hud {
            padding: 20px;
            background: var(--panel-bg);
            border-bottom: 1px solid #111;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .metric { 
            display: flex; 
            flex-direction: column; 
            border-left: 1px solid var(--accent-dim);
            padding-left: 10px;
        }
        
        .label { 
            color: var(--neutral-dim); 
            font-size: 0.6rem; 
            letter-spacing: 2px; 
            margin-bottom: 4px;
        }

        .value { 
            font-size: 0.9rem; 
            font-weight: bold; 
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        /* --- STRUCTURAL BAY --- */
        #structural-bay {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--substrate);
            position: relative;
        }

        .bay-header {
            font-size: 0.55rem;
            padding: 8px 20px;
            color: var(--neutral-dim);
            border-bottom: 1px solid #111;
            letter-spacing: 1px;
        }

        #code-input {
            flex: 1;
            background: transparent;
            color: var(--accent);
            border: none;
            padding: 20px;
            font-family: var(--font);
            font-size: 15px;
            resize: none;
            outline: none;
            text-transform: none;
            caret-color: var(--accent);
            transition: color 0.3s ease;
        }

        /* --- LIVE SURFACE --- */
        #live-surface {
            height: 35%;
            background: #0a0a0a;
            padding: 12px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #111;
        }

        #preview-frame {
            flex: 1;
            width: 100%;
            background: white;
            border: 1px solid #222;
            border-radius: 4px;
        }

        /* --- CONTROL CONSOLE (SLIDER + PULSE) --- */
        #control-console {
            background: var(--panel-bg);
            border-top: 1px solid #111;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
        }

        /* The Custom Spectral Slider */
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #spectral-rail {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: linear-gradient(to right, 
                #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            border-radius: 6px;
            outline: none;
            border: 1px solid #222;
        }

        #spectral-rail::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            background: var(--substrate);
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5), 0 0 10px var(--accent-glow);
        }

        /* Pulse Action */
        #pulse-trigger {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 15px;
            font-family: var(--font);
            font-size: 0.8rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 0 5px var(--accent-glow);
            box-shadow: inset 0 0 0 var(--accent-dim);
        }

        #pulse-trigger:active {
            background: var(--accent);
            color: var(--substrate);
            box-shadow: 0 0 30px var(--accent);
        }

        /* --- STATUS LOGIC --- */
        .nominal { color: var(--accent); }
        .strain { color: var(--warning); text-shadow: 0 0 10px var(--warning); }
        .collapse { color: var(--critical); animation: alert 0.5s infinite; }

        @keyframes alert { 
            0%, 100% { opacity: 1; text-shadow: 0 0 15px var(--critical); } 
            50% { opacity: 0.4; text-shadow: 0 0 0px var(--critical); } 
        }

        .flash-active {
            border-color: var(--accent) !important;
            box-shadow: inset 0 0 20px var(--accent-dim) !important;
        }
    </style>
</head>
<body>

    <div id="field-os-hud">
        <div class="metric">
            <span class="label">STATUS</span>
            <span id="state-val" class="value nominal">BOOTING</span>
        </div>
        <div class="metric">
            <span class="label">ENERGY</span>
            <span id="energy-val" class="value">0.000</span>
        </div>
        <div class="metric">
            <span class="label">STABILITY</span>
            <span id="stability-val" class="value">1.000</span>
        </div>
        <div class="metric">
            <span class="label">PULSE_SEQ</span>
            <span id="pulse-val" class="value">0</span>
        </div>
    </div>

    <div id="structural-bay">
        <div class="bay-header">STRUCTURAL_BAY // INTENT_INPUT</div>
        <textarea id="code-input" spellcheck="false" placeholder="// INJECT STRUCTURE"><h1>FIELDRATE_ENGINE</h1>
<p>Substrate nominal. Spectral tuning active.</p></textarea>
    </div>

    <div id="live-surface">
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="control-console">
        <div class="slider-container">
            <div class="label">WAVELENGTH_TUNING</div>
            <input type="range" id="spectral-rail" min="0" max="360" value="185">
        </div>
        
        <button id="pulse-trigger" onclick="FieldOS.pulse(0.1)">INJECT_PULSE</button>
    </div>

    <script>
        const FieldOS = {
            kernel: {
                energy: 0.0,
                stability: 1.0,
                pulses: 0,
                resilience: 0.88
            },

            tune: function(hue) {
                document.documentElement.style.setProperty('--accent-hue', hue);
                this.render();
            },

            generateVessel: function(content) {
                return `<html><head><style>
                    body { background: #fff; color: #000; font-family: sans-serif; padding: 25px; line-height: 1.6; margin: 0; }
                    h1 { margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
                </style></head><body>${content}</body></html>`;
            },

            sync: function() {
                const input = document.getElementById('code-input').value;
                const preview = document.getElementById('preview-frame');
                const doc = preview.contentDocument || preview.contentWindow.document;
                
                doc.open();
                doc.write(this.generateVessel(input));
                doc.close();

                this.kernel.pulses++;
                this.calculate(input);
                this.render();
            },

            calculate: function(content) {
                const len = content.trim().length;
                if (len === 0) {
                    this.kernel.energy = 0;
                    this.kernel.stability = 0;
                } else {
                    this.kernel.energy = len / 450; 
                    const pressure = this.kernel.energy * (1 - this.kernel.resilience);
                    this.kernel.stability = Math.max(0, 1 - (pressure * 2.2));
                }
            },

            pulse: function(magnitude) {
                this.kernel.pulses++;
                this.kernel.energy += magnitude;
                
                const hud = document.getElementById('field-os-hud');
                hud.classList.add('flash-active');
                setTimeout(() => hud.classList.remove('flash-active'), 120);
                
                this.render();
            },

            render: function() {
                const stateEl = document.getElementById('state-val');
                document.getElementById('energy-val').innerText = this.kernel.energy.toFixed(3);
                document.getElementById('stability-val').innerText = this.kernel.stability.toFixed(3);
                document.getElementById('pulse-val').innerText = this.kernel.pulses;

                if (this.kernel.stability <= 0) {
                    stateEl.innerText = "COLLAPSE";
                    stateEl.className = "value collapse";
                } else if (this.kernel.stability < 0.75) {
                    stateEl.innerText = "STRAIN";
                    stateEl.className = "value strain";
                } else {
                    stateEl.innerText = "NOMINAL";
                    stateEl.className = "value nominal";
                }
            },

            boot: function() {
                const editor = document.getElementById('code-input');
                const slider = document.getElementById('spectral-rail');

                editor.addEventListener('input', () => this.sync());
                slider.addEventListener('input', (e) => this.tune(e.target.value));
                
                setTimeout(() => {
                    this.sync();
                    console.log("FIELD_OS // SUBSTRATE_NOMINAL");
                }, 400);
            }
        };

        window.onload = () => FieldOS.boot();
    </script>
</body>
</html>
