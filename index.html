<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIELD_OS // STRUCTURAL_BAY</title>
    <style>
        :root {
            --substrate: #050505;
            --cyan: #00f2ff;
            --cyan-dim: rgba(0, 242, 255, 0.15);
            --warning: #ffaa00;
            --critical: #ff3300;
            --font: 'Courier New', monospace;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--substrate);
            color: var(--cyan);
            font-family: var(--font);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* --- HUD --- */
        #field-os-hud {
            padding: 15px;
            border-bottom: 1px solid var(--cyan-dim);
            background: rgba(0, 242, 255, 0.02);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            flex-shrink: 0;
        }

        .metric { display: flex; flex-direction: column; }
        .label { color: var(--cyan-dim); font-size: 0.6rem; letter-spacing: 1px; }
        .value { font-size: 0.85rem; font-weight: bold; }

        /* --- STRUCTURAL BAY (INPUT) --- */
        #structural-bay {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid var(--cyan-dim);
            min-height: 30%;
        }

        #code-input {
            flex: 1;
            background: transparent;
            color: var(--cyan);
            border: none;
            padding: 15px;
            font-family: var(--font);
            font-size: 14px;
            resize: none;
            outline: none;
            text-transform: none; /* Code must remain case-sensitive */
            caret-color: var(--cyan);
        }

        /* --- LIVE SURFACE (PREVIEW) --- */
        #live-surface {
            flex: 1;
            background: #fff; /* White substrate for rendered content visibility */
            min-height: 30%;
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- CONTROLS --- */
        #controls {
            padding: 10px;
            display: flex;
            justify-content: center;
            border-top: 1px solid var(--cyan-dim);
            flex-shrink: 0;
        }

        #pulse-trigger {
            background: transparent;
            color: var(--cyan);
            border: 1px solid var(--cyan);
            padding: 10px 30px;
            font-family: var(--font);
            font-size: 0.7rem;
            letter-spacing: 2px;
            cursor: pointer;
        }

        #pulse-trigger:active {
            background: var(--cyan);
            color: var(--substrate);
        }

        /* --- STATES --- */
        .nominal { color: var(--cyan); text-shadow: 0 0 5px var(--cyan); }
        .strain { color: var(--warning); text-shadow: 0 0 5px var(--warning); }
        .collapse { color: var(--critical); animation: alert 0.4s infinite; }

        @keyframes alert {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .system-flash { border-color: var(--cyan) !important; }
    </style>
</head>
<body>

    <div id="field-os-hud">
        <div class="metric">
            <span class="label">STATE</span>
            <span id="state-val" class="value nominal">IDLE</span>
        </div>
        <div class="metric">
            <span class="label">ENERGY_DENSITY</span>
            <span id="energy-val" class="value">0.000</span>
        </div>
        <div class="metric">
            <span class="label">STABILITY</span>
            <span id="stability-val" class="value">1.000</span>
        </div>
        <div class="metric">
            <span class="label">PULSE_COUNT</span>
            <span id="pulse-val" class="value">0</span>
        </div>
    </div>

    <div id="structural-bay">
        <textarea id="code-input" spellcheck="false" placeholder="// INJECT CODE HERE"><h1 style="color: #050505;">Reality Formed</h1></textarea>
    </div>

    <div id="live-surface">
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="controls">
        <button id="pulse-trigger" onclick="FieldOS.pulse(0.1)">Manual Pulse</button>
    </div>

    <script>
        const FieldOS = {
            kernel: {
                energy: 0.0,
                stability: 1.0,
                pulses: 0,
                resilience: 0.85
            },

            // Process intent and update system physics
            inject: function(content) {
                this.kernel.pulses++;
                
                // Content length drives energy density
                const rawEnergy = content.length / 500;
                this.kernel.energy = rawEnergy;

                // Calculate stability
                if (content.trim().length === 0) {
                    this.kernel.stability = 0;
                } else {
                    // Pressure builds as energy exceeds resilience
                    const pressure = this.kernel.energy * (1 - this.kernel.resilience);
                    this.kernel.stability = Math.max(0, 1 - (pressure * 2));
                }

                this.render();
                this.syncSurface(content);
            },

            // Direct manual energy injection
            pulse: function(magnitude) {
                this.kernel.pulses++;
                this.kernel.energy += magnitude;
                this.kineticFeedback();
                this.render();
            },
