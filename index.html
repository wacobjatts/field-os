<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field UI</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background:#0b0f14;
  color:#e6edf3;
}

/* ===== LAYOUT ===== */
.app {
  display:grid;
  grid-template-columns:220px 1fr 260px;
  grid-template-rows:60px 1fr 160px;
  height:100vh;
}

/* ===== TOP BAR ===== */
.top {
  grid-column:1 / span 3;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  background:#11161d;
  border-bottom:1px solid #222;
}

.symbol {
  font-weight:bold;
  font-size:18px;
}

.timeframe {
  color:#ffd84d;
}

/* ===== LEFT ===== */
.left {
  background:#11161d;
  border-right:1px solid #222;
  padding:10px;
}

.ticker {
  padding:10px;
  margin-bottom:6px;
  background:#1a212b;
  cursor:pointer;
}

.ticker:hover {
  background:#222c39;
}

/* ===== CENTER (CHART) ===== */
.center {
  position:relative;
  background:#070b12;
}

/* grid */
.center::before {
  content:'';
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

/* baseline */
.baseline {
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:1px;
  background:rgba(255,255,255,0.25);
}

/* lines */
.line {
  position:absolute;
  left:0;
  right:0;
  height:1px;
  background:rgba(255,255,255,0.1);
}

.topline { top:20%; }
.bottomline { top:80%; }

/* numbers */
.num {
  position:absolute;
  left:8px;
  color:#ffd84d;
  font-size:11px;
}

.n1 { top:18%; }
.n2 { top:48%; }
.n3 { top:78%; }

/* main line */
svg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

.value {
  position:absolute;
  top:10px;
  right:10px;
  font-size:28px;
  color:#ffd84d;
}

/* ===== RIGHT ===== */
.right {
  background:#11161d;
  border-left:1px solid #222;
  padding:10px;
}

.order {
  display:flex;
  justify-content:space-between;
  padding:8px;
  margin-bottom:6px;
  background:#1a212b;
}

.ask { color:#ff6b6b; }
.bid { color:#4ade80; }

/* ===== BOTTOM ===== */
.bottom {
  grid-column:2 / span 2;
  display:flex;
  background:#0f141b;
  border-top:1px solid #222;
  overflow-x:auto;
}

.card {
  min-width:160px;
  padding:12px;
  border-right:1px solid #222;
  text-align:center;
  color:#4da3ff;
}

/* ===== MOBILE ===== */
@media (max-width:900px) {
  .app {
    grid-template-columns:1fr;
    grid-template-rows:60px 1fr 120px;
  }

  .left, .right {
    display:none;
  }

  .bottom {
    grid-column:1;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="top">
    <div class="symbol">TSLA</div>
    <div class="timeframe">5m</div>
  </div>

  <div class="left">
    <div class="ticker">TSLA</div>
    <div class="ticker">NVDA</div>
    <div class="ticker">SPY</div>
    <div class="ticker">QQQ</div>
  </div>

  <div class="center">

    <div class="baseline"></div>
    <div class="line topline"></div>
    <div class="line bottomline"></div>

    <div class="num n1">80</div>
    <div class="num n2">50</div>
    <div class="num n3">20</div>

    <svg viewBox="0 0 1000 400">
      <path
        d="M0 200 C200 260 350 180 500 220
           C650 260 800 180 1000 210"
        stroke="#4da3ff"
        stroke-width="2"
        fill="none"
      />
    </svg>

    <div class="value">63</div>

  </div>

  <div class="right">
    <div class="order ask"><span>Ask</span><span>248.22</span></div>
    <div class="order bid"><span>Bid</span><span>248.10</span></div>
  </div>

  <div class="bottom">
    <div class="card">Volume</div>
    <div class="card">Transmission</div>
    <div class="card">Decay</div>
    <div class="card">Tension</div>
    <div class="card">Oscillator</div>
    <div class="card">Compression</div>
  </div>

</div>

</body>
</html>
