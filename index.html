<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>field-os</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#020305;
  color:#cfe6ff;
  font-family: Arial, sans-serif;
}

/* MOBILE FIRST */
.app {
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* LEFT (ticker) */
.left {
  display:flex;
  overflow-x:auto;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.ticker {
  min-width:80px;
  padding:10px;
  text-align:center;
  border-right:1px solid rgba(255,255,255,0.08);
}

/* CENTER (chart) */
.center {
  flex:1;
  position:relative;
}

/* CHART AREA */
.chart {
  position:absolute;
  inset:0;
}

/* BASELINE */
.baseline {
  position:absolute;
  top:50%;
  left:0;
  right:0;
  height:1px;
  background:rgba(255,255,255,0.25);
}

/* TOP / BOTTOM LINES */
.line {
  position:absolute;
  left:0;
  right:0;
  height:1px;
  background:rgba(255,255,255,0.1);
}

.top { top:20%; }
.bottom { top:80%; }

/* NUMBERS */
.num {
  position:absolute;
  left:6px;
  color:#ffd84d;
  font-size:11px;
}

.n1 { top:18%; }
.n2 { top:48%; }
.n3 { top:78%; }

/* VALUE */
.value {
  position:absolute;
  right:10px;
  top:10px;
  color:#ffd84d;
  font-size:22px;
  font-weight:bold;
}

/* LINE */
svg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* RIGHT PANEL (HIDDEN ON MOBILE) */
.right {
  display:none;
}

/* BOTTOM INSTRUMENT STACK */
.bottom {
  height:110px;
  border-top:1px solid rgba(255,255,255,0.08);
  display:flex;
  overflow-x:auto;
}

.card {
  min-width:140px;
  border-right:1px solid rgba(255,255,255,0.08);
  padding:12px;
  text-align:center;
  color:#1e7bff;
}

/* DESKTOP */
@media (min-width:900px) {
  .app {
    display:grid;
    grid-template-columns:180px 1fr 220px;
    grid-template-rows:1fr 140px;
  }

  .left {
    flex-direction:column;
    overflow:auto;
    grid-row:1 / span 2;
    border-right:1px solid rgba(255,255,255,0.08);
    border-bottom:none;
  }

  .center {
    grid-column:2;
  }

  .right {
    display:block;
    padding:10px;
    border-left:1px solid rgba(255,255,255,0.08);
  }

  .bottom {
    grid-column:2 / span 2;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="left">
    <div class="ticker">TSLA</div>
    <div class="ticker">NVDA</div>
    <div class="ticker">SPY</div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="chart">

      <div class="line top"></div>
      <div class="baseline"></div>
      <div class="line bottom"></div>

      <div class="num n1">80</div>
      <div class="num n2">50</div>
      <div class="num n3">20</div>

      <svg viewBox="0 0 1000 400">
        <path
          d="M0 200 C200 260 350 180 500 220
             C650 260 800 180 1000 210"
          stroke="#1e7bff"
          stroke-width="2"
          fill="none"
        />
      </svg>

      <div class="value">63</div>

    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    ASK / BID
  </div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="card">volume</div>
    <div class="card">transmission</div>
    <div class="card">decay</div>
    <div class="card">tension</div>
    <div class="card">oscillator</div>
    <div class="card">compression</div>
  </div>

</div>

</body>
</html>
